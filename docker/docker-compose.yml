version: '3.8'

services:
  redis:
    image: redis:5.0.2
    container_name: crypto_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:5.7
    container_name: crypto_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: crypto_detection
      MYSQL_USER: admin
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - crypto_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  fate-board:
    image: federatedai/standalone_fate:1.11.0
    container_name: fate_board
    ports:
      - "8080:8080"
      - "9380:9380"
      - "9390:9390"
    volumes:
      - fate_data:/data/projects/fate
    networks:
      - crypto_network
    depends_on:
      - mysql
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3

  crypto-detection:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: crypto_detection_service
    ports:
      - "5000:5000"
    environment:
      - FATE_HOST=fate_board
      - FATE_PORT=9380
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=crypto_detection
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=password
    volumes:
      - ./data:/app/data
    networks:
      - crypto_network
    depends_on:
      - fate-board
      - mysql
      - redis

volumes:
  redis_data:
  mysql_data:
  fate_data:

networks:
  crypto_network:
    driver: bridge