security:
  enabled: false
  mode: safe
  trace_id:
    enabled: true
    header_name: X-Trace-Id
  rate_limit:
    enabled: false
    default_limit_per_minute: 60
    window_seconds: 60
    include_paths:
      - /api/
    exclude_paths:
      - /
      - /static/
      - /favicon.ico
    log_path: data/logs/rate_limit.log
  anti_replay:
    enabled: false
    max_age_seconds: 60
    nonce_header: X-Nonce
    timestamp_header: X-Timestamp
  sign_verify:
    enabled: false
    signature_header: X-Sign
    timestamp_header: X-Sign-Timestamp
  ip_filter:
    enabled: false
    allowlist: []
    blocklist: []
  slow_api:
    enabled: true
    threshold_ms: 1000
    log_path: data/logs/slow_api.log
  api_switch:
    enabled: false
    disabled_paths: []
  security_logger:
    enabled: false
    sqlite_table: security_events
  security_events:
    enabled: false
    log_path: data/logs/security_events.log
    max_events: 200
    max_extra_chars: 4096
  request_crypto:
    enabled: false
    mode: placeholder
